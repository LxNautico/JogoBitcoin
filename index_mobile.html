<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JogoBitcoin Mobile - Mineração Otimizada</title>
    <script>
        // Detecção automática de PC
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('v') !== 'mobile' && window.innerWidth >= 1024) {
                window.location.replace('index.html');
            }
        })();
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Estilos Originais de Desktop (apenas base) -->
    <link rel="stylesheet" href="styles.css">
    <!-- Estilos Exclusivos Mobile -->
    <link rel="stylesheet" href="mobile.css">
</head>
<body class="tab-game">
    <!-- Overlay de Carregamento -->
    <div id="loading-overlay" style="position:fixed; inset:0; background:#000; z-index:99999; display:flex; justify-content:center; align-items:center; color:#00ffff; font-family:'Share Tech Mono';">
        CARREGANDO AMBIENTE MOBILE...
    </div>

    <!-- Header Mobile Compacto -->
    <header id="top-header">
        <div style="font-weight: 800; color: #00ffff; font-size: 1.1em;">JOGOBITCOIN</div>
        <div id="bitcoin-value">Carregando...</div>
    </header>

    <!-- Navegação por Abas (Mudar de Contexto) -->
    <nav id="mobile-nav">
        <button onclick="switchMobileTab('game')" class="mobile-tab-btn active" data-tab="game">🎮 Jogo</button>
        <button onclick="switchMobileTab('history')" class="mobile-tab-btn" data-tab="history">📜 Histórico</button>
        <button onclick="switchMobileTab('blockchain')" class="mobile-tab-btn" data-tab="blockchain">⛓️ Chain</button>
        <button onclick="switchMobileTab('config')" class="mobile-tab-btn" data-tab="config">⚙️ Ajustes</button>
    </nav>

    <!-- ElementOS Ocultos para compatibilidade com script.js (desktop logic) -->
    <div style="display:none;">
        <div id="info-container"></div>
        <div id="difficulty-selection"></div>
        <div id="mensagem-container"></div>
        <div id="mensagens-laterais"></div>
        <div id="tempo-global"></div>
    </div>

    <main id="mobile-main-content">
        <!-- TELA DE JOGO (TAB: game) -->
        <div class="mobile-section container center active" id="section-game">
            <div id="game-container">
                <div class="score-container" style="display:flex; justify-content:center; gap:20px; width:100%; margin-bottom:10px;">
                    <div style="display:flex; align-items:baseline; gap:5px;">
                        <span>Score:</span>
                        <div id="score-display" style="display:flex; gap:2px;">
                           <div class="score-box">0</div><div class="score-box">0</div><div class="score-box">0</div><div class="score-box">0</div>
                        </div>
                    </div>
                    <div id="vidas-container" class="vidas-container"></div>
                </div>
                <div id="blocks-container"></div>
            </div>

            <div id="problem-container">
                <div id="mining-status-mobile">
                    <div class="mining-coin-info">
                        <img id="mobile-current-coin-logo" src="" alt="" style="width:20px;">
                        <span id="mobile-current-coin-name">---</span>
                    </div>
                    <div class="mining-block-info">Bloco: <span id="mobile-current-block-num">#0</span></div>
                </div>
                <div id="problema-texto" style="font-size: 1.2em; text-align:center; margin:10px 0;">Aguardando...</div>
                
                <div id="mobile-quick-tool">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                        <span style="font-size:0.8em; color:#888;">Girar:</span>
                        <input type="range" id="quick-shift-slider" min="-25" max="25" value="3" oninput="updateQuickDecrypt()" style="flex:1;">
                        <span id="quick-shift-val" style="background:#00ffff; color:#000; padding:2px 8px; border-radius:10px;">3</span>
                    </div>
                    <div id="quick-decrypt-result" style="font-family:monospace; color:#00ff00; background:rgba(0,0,0,0.4); padding:5px; border-radius:5px; text-align:center; min-height:24px;"></div>
                    <button onclick="applyQuickDecrypt()" style="width:100%; background:linear-gradient(135deg, #00ffff, #0088aa); color:black; font-weight:bold; height:40px; border:none; border-radius:8px; margin-top:5px;">✅ USAR RESPOSTA</button>
                </div>

                <input type="text" id="answer" placeholder="Resposta Manual..." style="width:100%; height:45px; margin-top:10px;">
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button id="submit-button" onclick="submeterResposta()" style="flex:1; background:#4CAF50; height:45px; border:none; border-radius:8px; color:white; font-weight:bold;">ENVIAR</button>
                    <button onclick="pularProblema()" style="background:#ff4444; width:50px; border-radius:8px; border:none; color:white;">⏭️</button>
                </div>
            </div>
        </div>

        <!-- OUTRAS SEÇÕES (Placeholder para o Script gerenciar) -->
        <div class="mobile-section" id="section-history" style="display:none; padding:20px;">
            <h2 style="color:#ffaa00;">📜 Histórico</h2>
            <div id="history-container"></div>
        </div>

        <div class="mobile-section container right" id="section-blockchain" style="display:none; padding:20px;">
            <h2 style="color:#00ffff;">⛓️ Blockchain</h2>
            <div id="hash-log">
                <div id="blockchain-cadeia"></div>
            </div>
        </div>

        <div class="mobile-section" id="section-config" style="display:none; padding:20px;">
             <h2 style="color:#ffaa00;">⚙️ Configurações</h2>
             <button onclick="resetGame()" style="width:100%; padding:15px; background:#f44336; border:none; border-radius:8px; color:white; font-weight:bold; margin-bottom:10px;">REINICIAR JOGO</button>
             <button onclick="window.location.href='index.html?v=desktop'" style="width:100%; padding:15px; background:#2196F3; border:none; border-radius:8px; color:white; font-weight:bold;">VERSÃO DESKTOP</button>
        </div>
    </main>

    <!-- Barra de Ferramentas Inferior -->
    <div id="mobile-action-bar">
        <div class="action-group">
            <button onclick="toggleChat()">💬</button>
            <button onclick="toggleSkins()">🎨</button>
        </div>
        <div class="action-group center">
            <button onclick="ativarCirculoCesar()" class="tool-btn-mobile">🔄</button>
            <button onclick="abrirDecodificador()" class="tool-btn-mobile">🔧</button>
        </div>
        <div class="action-group">
            <button onclick="toggleWallet()">💰</button>
            <button onclick="toggleProfile()">👤</button>
        </div>
    </div>

    <!-- MODAIS E COMPONENTES TIPO DESKTOP (Eles usam as IDs que o script.js espera) -->
    <div id="mensagem-final" style="display: none;">
        <div id="mensagem-texto"></div>
        <button id="restart-button" onclick="resetGame()">Reiniciar Jogo</button>
    </div>

    <!-- MODAL PERFIL/LOGIN -->
    <div id="profile-modal" class="modal-mobile" style="display:none;">
        <div id="profile-panel">
            <div id="profile-header">
                <span>Perfil</span>
                <button id="profile-close" onclick="fecharTodosModais()">×</button>
            </div>
            <div id="profile-body">
                <div id="profile-current"></div>
                <div class="profile-actions">
                    <input id="profile-username" placeholder="Usuário">
                    <input id="profile-password" type="password" placeholder="Senha">
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <button id="profile-login">Entrar</button>
                        <button id="profile-register">Criar</button>
                        <button id="profile-guest" style="background:#607d8b;">Convidado</button>
                        <button id="profile-logout" style="background:#f44336;">Sair</button>
                    </div>
                    <button onclick="window.location.href='index.html?v=desktop'" style="width:100%; margin-top:15px; background:#2196F3; color:white; border:none; padding:10px; border-radius:8px;">🖥️ VERSÃO DESKTOP</button>
                </div>
            </div>
        </div>
    </div>

    <div id="skins-modal" style="display:none;">
        <div id="skins-header"><span>Loja</span><button id="skins-close">×</button></div>
        <div id="skins-tabs"><button data-tab="skins" class="active">Skins</button><button data-tab="coins">Moedas</button></div>
        <div id="skins-list" data-section="skins"></div>
        <div id="coins-list" data-section="coins" style="display:none;"></div>
    </div>

    <div id="achievements-modal" style="display:none;">
        <div id="achievements-panel">
            <div id="achievements-header"><span>Conquistas</span><button id="achievements-close">×</button></div>
            <div id="achievements-body"><div id="achievements-list"></div></div>
        </div>
    </div>

    <div id="wallet-modal" style="display:none;">
        <div id="wallet-panel">
            <div id="wallet-header"><span>Carteira</span><button id="wallet-close">×</button></div>
            <div id="wallet-body">
                <p>Saldo: <strong id="wallet-balance">0 BTC</strong></p>
                <input id="wallet-amount" type="number" placeholder="Valor">
                <button id="wallet-deposit">Depositar</button>
                <button id="wallet-withdraw">Sacar</button>
            </div>
        </div>
    </div>

    <!-- Script de Chat (Precisa dos IDs) -->
    <div id="chat-box" style="display:none; position:fixed; bottom:70px; left:10px; right:10px; height:300px; background:rgba(0,0,0,0.9); z-index:20000; flex-direction:column; border:2px solid #00ffff; border-radius:15px;">
        <div id="chat-header" style="background:#00ffff; color:#000; padding:10px; display:flex; justify-content:space-between;">
            <span>Chat</span>
            <button id="chat-close" style="background:none; border:none; font-size:1.5em; cursor:pointer;">×</button>
        </div>
        <div id="chat-messages" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div id="chat-input-area" style="padding:10px; display:flex; gap:5px;">
            <input id="chat-input" style="flex:1; background:#222; color:white; border:1px solid #444; padding:5px;">
            <button id="chat-send" style="background:#00ffff; border:none; padding:5px 15px;">OK</button>
        </div>
    </div>

    <!-- Círculo de César -->
    <div id="circulo-cesar" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 30000; justify-content: center; align-items: center;">
        <div style="background: #1a1a2e; padding: 20px; border-radius: 20px; border: 3px solid #00ffff; width: 95%; max-width: 400px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="color: #00ffff; margin: 0;">🔄 César</h3>
                <button onclick="fecharCirculo()" style="background:none; border:none; color:white; font-size:2em;">×</button>
            </div>
            <div id="texto-cifrado-destaque" style="display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap;"></div>
            <div style="position: relative; width: 250px; height: 250px; margin: 10px auto;">
                <div style="position: absolute; inset: 0; border-radius: 50%; border: 2px solid gold;">
                    <div id="circulo-externo-letras" style="position: relative; width: 100%; height: 100%;"></div>
                </div>
                <div id="circulo-interno" style="position: absolute; width: 120px; height: 120px; top: 65px; left: 65px; border-radius: 50%; border: 2px solid #00ffff; background: #000;">
                    <div id="letra-atual" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2em; color: #4CAF50;"></div>
                </div>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; margin: 10px 0;">
                <button onclick="girarLetraAtual(-1)" style="padding: 10px 20px; background: #00ffff; border: none; border-radius: 20px;">←</button>
                <button onclick="girarLetraAtual(1)" style="padding: 10px 20px; background: #00ffff; border: none; border-radius: 20px;">→</button>
            </div>
            <div id="resposta-construida" style="font-size: 1.5em; text-align: center; color: #00ffff; margin-bottom: 10px; min-height: 1.5em;"></div>
            <button onclick="usarRespostaConstruida()" style="width: 100%; padding: 12px; background: #4CAF50; border: none; border-radius: 10px; color: white; font-weight: bold;">✅ OK</button>
        </div>
    </div>

    <!-- Decodificador -->
    <div id="decodificador-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 31000; justify-content: center; align-items: center;">
        <div style="background: #1a1a2e; padding: 20px; border-radius: 20px; border: 3px solid #00ffff; width: 95%; max-height: 85vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color: #00ffff; margin: 0;">🔧 DECODIFICADOR</h3>
                <button onclick="fecharDecodificador()" style="background:none; border:none; color:white; font-size:2em;">×</button>
            </div>
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <button class="decod-nivel active" data-nivel="facil" onclick="abrirDecodNivel('facil')" style="flex:1; padding:8px; background:#00aa00; border:none; color:white;">FÁCIL</button>
                <button class="decod-nivel" data-nivel="medio" onclick="abrirDecodNivel('medio')" style="flex:1; padding:8px; background:#444; border:none; color:white;">MÉDIO</button>
                <button class="decod-nivel" data-nivel="dificil" onclick="abrirDecodNivel('dificil')" style="flex:1; padding:8px; background:#444; border:none; color:white;">DIFÍCIL</button>
            </div>
            <div id="decod-facil" class="decod-conteudo">
                <textarea id="decod-facil-input" rows="2" style="width:100%; background:#222; color:white; padding:10px; border:1px solid #00ffff;"></textarea>
                <input type="range" id="decod-facil-shift" min="-25" max="25" value="3" style="width:100%; margin:10px 0;">
                <button onclick="decodificarFacil()" style="width:100%; padding:10px; background:#00ffff; color:#000;">DECODIFICAR</button>
            </div>
            <div id="decod-medio" class="decod-conteudo" style="display:none;">
                 <textarea id="decod-medio-cesar-input" rows="2" style="width:100%; background:#222; color:white; padding:10px; border:1px solid #ffaa00;"></textarea>
                 <button onclick="decodificarMedio()" style="width:100%; padding:10px; background:#ffaa00; color:#000; margin-top:5px;">DECODIFICAR</button>
            </div>
            <div id="decod-dificil" class="decod-conteudo" style="display:none;">
                 <textarea id="decod-dificil-input" rows="2" style="width:100%; background:#222; color:white; padding:10px; border:1px solid #ff4400;"></textarea>
                 <button onclick="decodificarDificil()" style="width:100%; padding:10px; background:#ff4400; color:white; margin-top:5px;">DECODIFICAR</button>
            </div>
            <div style="margin-top:15px; padding:10px; background:rgba(0,0,0,0.5); border:1px solid gold;">
                <div id="decod-resultado" style="color:#00ff00; font-family:monospace; min-height:20px;"></div>
                <button onclick="usarResultadoEEnviar()" style="width:100%; margin-top:10px; background:gold; color:black; font-weight:bold; padding:8px;">USAR E ENVIAR</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Inicialização Mobile
        window.addEventListener('load', () => {
             console.log('Mobile environment loading...');
             setTimeout(() => {
                document.getElementById('loading-overlay').fadeOut();
                // Tenta iniciar o jogo se não estiver ativo
                if (typeof jogoConcluido !== 'undefined') {
                    if (!jogoConcluido) startGame('medio');
                } else if (typeof startGame === 'function') {
                    startGame('medio');
                }
             }, 200);
        });

        Element.prototype.fadeOut = function() {
            this.style.opacity = '1';
            this.style.transition = 'opacity 0.5s ease';
            this.style.opacity = '0';
            setTimeout(() => this.style.display = 'none', 500);
        }

        function switchMobileTab(tab) {
            console.log('Switching to tab:', tab);
            document.querySelectorAll('.mobile-section').forEach(s => {
                s.style.display = 'none';
                s.classList.remove('active');
            });
            document.querySelectorAll('.mobile-tab-btn').forEach(b => b.classList.remove('active'));
            
            const target = document.getElementById('section-' + tab);
            if (target) {
                target.style.display = 'flex';
                target.classList.add('active');
            }
            const btn = document.querySelector(`[data-tab="${tab}"]`);
            if (btn) btn.classList.add('active');
        }
    </script>
</body>
</html>
